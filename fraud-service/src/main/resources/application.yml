server:
  port: 8082

spring:
  application:
    name: fraud-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: fraud-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.fingaurd.dto"
        spring.json.value.default.type: com.fingaurd.dto.TransactionEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kafka:
  topics:
    transactions: transactions
    fraud-alerts: fraud-alerts

services:
  risk:
    url: ${RISK_SERVICE_URL}
  rag:
    url: ${RAG_SERVICE_URL}

fraud:
  thresholds:
    high-amount: 10000.00
    velocity-window-seconds: 3600
    velocity-max-count: 10
    score-flag: 0.7
    score-block: 0.9