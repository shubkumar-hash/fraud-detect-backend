server:
  port: 8086

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/fingaurd
    username: fingaurd
    password: fingaurd123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:fingaurd-super-secret-key-must-be-at-least-256-bits-long!!}
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-ms: 604800000   # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info
